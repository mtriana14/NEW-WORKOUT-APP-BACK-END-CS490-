name: HeraHealth Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Syntax & Import Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check all Python files
        run: |
          find app -name "*.py" -exec python -m py_compile {} \;
          python -m py_compile run.py
          echo "All syntax checks passed"

      - name: Verify Procfile exists
        run: |
          if [ ! -f Procfile ]; then
            echo "ERROR: Procfile missing"
            exit 1
          fi
          if ! grep -q "gunicorn run:app" Procfile; then
            echo "ERROR: Procfile must contain 'gunicorn run:app'"
            exit 1
          fi
          echo "Procfile OK: $(cat Procfile)"

      - name: Verify gunicorn in requirements.txt
        run: |
          if ! grep -iq "gunicorn" requirements.txt; then
            echo "ERROR: gunicorn missing from requirements.txt"
            exit 1
          fi
          echo "gunicorn found"

      - name: Check all models import cleanly
        env:
          SECRET_KEY: ci-secret-key
          JWT_SECRET_KEY: ci-jwt-secret
          DB_HOST: localhost
          DB_USER: root
          DB_PASSWORD: password
          DB_NAME: herahealth_test
          DB_PORT: 3306
          GOOGLE_CLIENT_ID: ci-google-client-id
          UPLOAD_FOLDER: static/uploads/profile_photos
        run: |
          python -c "
          from app.models.user import User
          from app.models.coach import Coach
          from app.models.coach_availability import CoachAvailability
          from app.models.client_request import ClientRequest
          from app.models.exercise import Exercise
          from app.models.notification import Notification
          from app.models.subscription import Subscription
          from app.models.saved_billing import SavedBilling
          from app.models.payment import Payment
          from app.models.coach_registration import CoachRegistration
          from app.models.coach_management import CoachManagement
          from app.models.hire import Hire
          from app.models.review import Review
          from app.models.activity_log import ActivityLog
          from app.models.workout_calendar import WorkoutCalendar
          from app.models.workout_exercise import WorkoutExercise
          from app.models.meal_plan import MealPlan
          from app.models.MealPlanFood import MealPlanFood
          from app.models.WorkoutPlan import WorkoutPlan
          from app.models.fitnessgoals import FitnessGoal
          from app.models.checkin import Check_in
          print('All models imported successfully')
          "

      - name: Check all controllers import cleanly
        env:
          SECRET_KEY: ci-secret-key
          JWT_SECRET_KEY: ci-jwt-secret
          DB_HOST: localhost
          DB_USER: root
          DB_PASSWORD: password
          DB_NAME: herahealth_test
          DB_PORT: 3306
          GOOGLE_CLIENT_ID: ci-google-client-id
          UPLOAD_FOLDER: static/uploads/profile_photos
        run: |
          python -c "
          from app.controllers.auth_controller import register, login, logout
          from app.controllers.activity_log_controller import log_strength, log_cardio, log_steps_calories
          from app.controllers.billing_controller import get_saved_cards, pay_with_saved_card
          from app.controllers.client_request_controller import send_request, respond_to_request
          from app.controllers.coach_apply_controller import apply_as_coach, get_my_application
          from app.controllers.coach_availability_controller import set_availability, get_availability
          from app.controllers.coach_dashboard_controller import get_coach_dashboard
          from app.controllers.coach_filter_controller import get_subscribed_coach, search_for_coaches
          from app.controllers.coach_management_controller import suspend_coach, reactivate_coach, disable_coach
          from app.controllers.coach_registration_controller2 import get_pending_registrations, get_all_registrations, process_coach_registration
          from app.controllers.dismiss_coach_controller import dismiss_coach
          from app.controllers.exercise_controller import get_all_exercises, create_exercise
          from app.controllers.fitnessgoal_controller import create_fitnessgoal, get_all_fitnessgoals
          from app.controllers.mealplan_controller import create_mealplan, get_all_mealplans
          from app.controllers.notification_controller import get_user_notifications, mark_as_read
          from app.controllers.oauth_controller import google_sign_in
          from app.controllers.password_reset_controller import forgot_password, reset_password
          from app.controllers.payment_dashboard_controller import get_payment_summary
          from app.controllers.pfp_controller import upload_pfp
          from app.controllers.review_controller import leave_review, get_coach_reviews
          from app.controllers.subscription_controller import subscribe_to_coach
          from app.controllers.survey_controller import create_checkin
          from app.controllers.workout_calendar_controller import get_my_weekly_calendar, assign_plan_to_date
          from app.controllers.workoutplans_controller import get_all_coach_workout_plans, create_workout_plan
          from app.controllers.activity_aggregate_controller import get_my_aggregates
          from app.controllers.billing_history_controller import get_my_invoices, get_coach_revenue
          from app.controllers.account_status_controller import deactivate_my_account, reactivate_account
          from app.controllers.admin_users_controller import get_all_users, update_user_status
          print('All controllers imported successfully')
          "
